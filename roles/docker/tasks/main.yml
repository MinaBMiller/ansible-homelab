---
# tasks/main.yml — Docker Role
#
# Installs Docker CE from Docker's official apt repository.
# We don't use Ubuntu's docker.io package because it's often outdated.

# ── Prerequisites ─────────────────────────────────────────────────────────────
#
# Docker's apt repo uses HTTPS and a GPG key to verify packages.
# These packages provide the tools needed to add and use that repo.

- name: Install packages required for Docker's apt repository
  ansible.builtin.apt:
    name:
      - ca-certificates    # root certificates so apt can verify HTTPS
      - curl               # download the GPG key
      - gnupg              # verify GPG signatures on packages
    state: present
    update_cache: true

# ── GPG Key ───────────────────────────────────────────────────────────────────
#
# APT uses GPG keys to verify that packages actually come from Docker
# and haven't been tampered with. Without this, anyone could host a fake
# package and you'd install it unknowingly.
#
# The key is stored in /etc/apt/keyrings/ — the modern location for
# third-party repo keys (replaces the deprecated apt-key command).

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker's official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

# ── APT Repository ───────────────────────────────────────────────────────────
#
# This tells apt where to find Docker packages.
# The 'arch' must match your CPU — arm64 for Apple Silicon VMs.
# 'signed-by' links the repo to the GPG key we just downloaded,
# so apt will only accept packages signed by Docker.

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_facts['distribution_release'] }} stable
    filename: docker
    state: present

# ── Install Docker ────────────────────────────────────────────────────────────
#
# docker-ce:         the Docker daemon (dockerd) — the engine that runs containers
# docker-ce-cli:     the 'docker' command you type in the terminal
# containerd.io:     the container runtime Docker uses under the hood
# docker-compose-plugin: 'docker compose' command (v2, replaces standalone docker-compose)

- name: Install Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present
    update_cache: true

- name: Install Docker Compose plugin
  ansible.builtin.apt:
    name: docker-compose-plugin
    state: present
  when: docker_install_compose

# ── Service ───────────────────────────────────────────────────────────────────

- name: Enable and start Docker service
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

# ── User Access ───────────────────────────────────────────────────────────────
#
# By default, only root can talk to the Docker daemon socket.
# Adding a user to the 'docker' group lets them run containers without sudo.
#
# Security note: docker group = root access. A user in this group can
# mount the host filesystem into a container and read/write anything.
# Fine for a homelab, but in production you'd use rootless Docker instead.

- name: Add users to the docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

# ── Firewall ──────────────────────────────────────────────────────────────────
#
# Docker manages its own iptables rules for container networking.
# We don't need to open specific ports here — each service role
# will open the ports it needs. But Docker's default behaviour can
# bypass UFW rules, so we configure Docker to respect UFW.

- name: Configure Docker to not bypass UFW
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "iptables": false
      }
    mode: '0644'
  notify: Restart Docker
