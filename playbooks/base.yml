---
# base.yml
#
# The baseline configuration applied to every server.
# Run this after bootstrap.yml has been run once.
#
# Usage:
#   ansible-playbook playbooks/base.yml

- name: Apply base configuration to all servers
  hosts: all
  become: true  # most system tasks require root

  roles:
    - common      # system baseline: updates, packages, firewall, SSH hardening
    - users       # user accounts, groups, SSH keys, sudo access
    - networking  # hostname, DNS, static IP, /etc/hosts
    - systemd     # service management, journal log limits, custom units
    - monitoring  # node exporter (metrics), logwatch (log digests)
    - nginx       # web server, reverse proxy, virtual hosts
    - docker      # container runtime for self-hosted services
    - suricata    # network intrusion detection (IDS), threat alerts
    - prometheus  # metrics collection and storage
    - loki        # log aggregation (Suricata alerts, syslog, auth)
    - grafana     # dashboards and visualization (http://<vm-ip>:3000)
