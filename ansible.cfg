[defaults]
# Where Ansible looks for your list of target machines
inventory = inventory/hosts.ini

# The default user Ansible will SSH in as
remote_user = ansible

# Don't prompt to verify SSH host keys (fine for a local lab, not for prod)
host_key_checking = False

# Where Ansible looks for reusable roles
roles_path = roles

# Makes output easier to read (yaml format via built-in default callback)
stdout_callback = ansible.builtin.default
result_format = yaml
