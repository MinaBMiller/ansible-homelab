---
# defaults/main.yml
#
# Default variable values for the common role.
# These can be overridden in inventory/group_vars/ or at the playbook level.

# Packages that every server should have installed
common_packages:
  - curl
  - vim
  - git
  - ufw           # firewall
  - fail2ban      # blocks brute-force SSH attempts
  - unattended-upgrades  # auto-installs security patches

# SSH port — change this if you want to use a non-standard port
ssh_port: 22

# Timezone for all servers
timezone: "America/New_York"
