---
# tasks/main.yml — Grafana Role
#
# Deploys Grafana as a Docker container with Prometheus and Loki
# pre-configured as data sources. Access the dashboard at:
#   http://<vm-ip>:3000

# ── Directories ───────────────────────────────────────────────────────────────

- name: Create Grafana data directory
  ansible.builtin.file:
    path: "{{ grafana_data_dir }}"
    state: directory
    owner: "472"    # Grafana's default user inside the container
    group: "472"
    mode: '0755'

- name: Create Grafana provisioning directories
  ansible.builtin.file:
    path: "/etc/grafana/provisioning/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - datasources
    - dashboards

# ── Configuration ─────────────────────────────────────────────────────────────

- name: Deploy Grafana data source provisioning
  ansible.builtin.template:
    src: datasources.yml.j2
    dest: /etc/grafana/provisioning/datasources/datasources.yml
    mode: '0644'

# ── Container ─────────────────────────────────────────────────────────────────

- name: Pull Grafana Docker image
  community.docker.docker_image:
    name: "{{ grafana_image }}"
    source: pull

- name: Run Grafana container
  community.docker.docker_container:
    name: grafana
    image: "{{ grafana_image }}"
    state: started
    restart_policy: unless-stopped
    network_mode: host
    env:
      GF_SECURITY_ADMIN_USER: "{{ grafana_admin_user }}"
      GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
    volumes:
      - "{{ grafana_data_dir }}:/var/lib/grafana"
      - "/etc/grafana/provisioning:/etc/grafana/provisioning"

# ── Firewall ──────────────────────────────────────────────────────────────────

- name: Allow Grafana port through UFW
  community.general.ufw:
    rule: allow
    port: "{{ grafana_port }}"
    proto: tcp
    comment: "Grafana"
