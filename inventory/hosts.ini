# Ansible Inventory — defines what machines Ansible can manage
#
# Format: alias ansible_host=<IP>
# The alias is just a friendly name. The IP is where Ansible will SSH.
#
# Groups are defined in [brackets]. You can have a machine in multiple groups.
# The special group [all] implicitly includes everything.

[control]
# This will be your main Ubuntu VM in UTM
# Update the IP after you create the VM
ubuntu-01 ansible_host=192.168.64.10

# Example of how you'd add more machines later:
# ubuntu-02 ansible_host=192.168.64.11

[all:vars]
# These variables apply to every machine in the inventory
ansible_python_interpreter=/usr/bin/python3
