---
# group_vars/all.yml
#
# Variables here apply to every host in your inventory.
# This is where you define the actual users for your homelab.
#
# To add a real SSH key: run `cat ~/.ssh/id_ed25519.pub` on your Mac
# and paste the output as the ssh_key value.

sysadmin_users:

  - name: mina
    groups:
      - ops
      - sudo
    shell: /bin/bash
    sudo: true
    # Replace this with your actual public key (run: cat ~/.ssh/id_ed25519.pub)
    ssh_key: "{{ lookup('env', 'MINA_SSH_PUB_KEY') }}"
    state: present

  # Example of a service account — no login shell, no SSH, just runs a process
  # /sbin/nologin means even if someone got this account's credentials,
  # they can't get an interactive shell with it
  - name: webrunner
    uid: 2002
    groups:
      - developers
    shell: /sbin/nologin
    sudo: false
    state: present

  # Add more users here when needed, e.g.:
  # - name: developer
  #   uid: 2001
  #   groups: [developers]
  #   shell: /bin/bash
  #   sudo: false
  #   ssh_key: "ssh-ed25519 AAAAC3..."
  #   state: present
